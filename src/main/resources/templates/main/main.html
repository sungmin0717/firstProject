<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로얄학원</title>
  <link rel="stylesheet" href="/css/main.css">
</head>


<body>

  <!-- 헤더 섹션션 -->
  <header>
    <div></div>
    <div></div>
    <div></div>
  </header>

  <div class="container">
    <!-- 배너 섹션 -->
    <div class="section image-section">
      <img src="/images/배너이미지.png" alt="학생 이미지">
    </div>

    <!-- 지도와 수상 내용 -->
    <div class="section map-and-award">
      <div class="map">
        <img src="/images/지도이미지.png" alt="지도">
        <div class="locations">
          <button>종로</button>
          <button>홍대</button>
          <button>강남</button>
        </div>
      </div>
      <div class="award">
        <img src="/images/수상이미지.png" alt="수상">
      </div>
    </div>

    <!-- 후기 섹션 -->
    <div class="section testimonials">
      <div class="testimonial">후기 내용<br><br>- 김*인</div>
      <div class="testimonial">후기 내용<br><br>- 김*인</div>
      <div class="testimonial">후기 내용<br><br>- 김*인</div>
      <div class="testimonial">후기 내용<br><br>- 김*인</div>
    </div>

    <!-- 합격 섹션 -->
    <div class="section results">
      <div class="result-box">
        <img src="/images/서울대학교합격.png" alt="서울대학교 합격">
      </div>
      <div class="result-box">
        <img src="커스텀 이미지 또는 기타 박스 URL" alt="커스텀 박스">
      </div>
    </div>

    <!-- 여백 또는 기타 내용 -->
    <div class="section" style="height: 200px; background-color: #ccc;"></div>

    <!-- 푸터 -->
    <footer class="footer">
      본사: 000-0000-000<br>
      종로점: 000-0000-000<br>
      홍대점: 000-0000-000<br>
      강남점: 000-0000-000
    </footer>

</body>


</html>
